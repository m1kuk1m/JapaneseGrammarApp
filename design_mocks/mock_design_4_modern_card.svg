<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" width="360" height="640">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCF8F2"/>
      <stop offset="100%" stop-color="#E5E4E2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="360" height="640" fill="url(#bgGrad)" />

  <!-- Top Header with large typography -->
  <text x="24" y="60" font-family="sans-serif" font-weight="bold" font-size="14" fill="#2B2A28" opacity="0.5" letter-spacing="2">WORKSPACE</text>
  
  <text x="24" y="110" font-family="sans-serif" font-weight="bold" font-size="32" fill="#2B2A28">分析する</text>
  
  <!-- Content Panel (Full width, bottom rounded, attached to top) -->
  <!-- Actually let's make it a floating sheet -->
  <rect x="16" y="140" width="328" height="400" rx="24" fill="#FFFFFF" opacity="0.9" />

  <!-- Model selector -->
  <circle cx="44" cy="180" r="16" fill="#ECCEB1" opacity="0.4" />
  <text x="44" y="184" font-family="sans-serif" font-size="12" fill="#2B2A28" text-anchor="middle">✨</text>
  <text x="68" y="184" font-family="sans-serif" font-weight="600" font-size="14" fill="#2B2A28">Gemini Pro</text>
  
  <!-- Text Input -->
  <text x="36" y="240" font-family="sans-serif" font-weight="300" font-size="18" fill="#2B2A28" opacity="0.4">ここにテキストを入力...</text>

  <!-- Media Actions Row -->
  <rect x="36" y="380" width="130" height="56" rx="16" fill="#F4EFE6" />
  <text x="101" y="413" font-family="sans-serif" font-weight="600" font-size="13" fill="#2B2A28" opacity="0.8">カメラ</text>
  <!-- Camera icon -->
  <circle cx="56" cy="408" r="8" fill="none" stroke="#2B2A28" stroke-width="1.5" opacity="0.8"/>
  <circle cx="56" cy="408" r="2" fill="#2B2A28" opacity="0.8"/>
  <rect x="48" y="401" width="16" height="14" rx="2" fill="none" stroke="#2B2A28" stroke-width="1.5" opacity="0.8"/>

  <rect x="174" y="380" width="150" height="56" rx="16" fill="#F4EFE6" />
  <text x="230" y="413" font-family="sans-serif" font-weight="600" font-size="13" fill="#2B2A28" opacity="0.8">アルバム</text>
  <!-- Image icon -->
  <rect x="188" y="399" width="18" height="18" rx="2" fill="none" stroke="#2B2A28" stroke-width="1.5" opacity="0.8"/>
  <circle cx="193" cy="404" r="2" fill="#2B2A28" opacity="0.8"/>
  <path d="M188 417 l 6 -6 l 4 4 l 3 -3 l 5 5" fill="none" stroke="#2B2A28" stroke-width="1.5" opacity="0.8"/>


  <!-- Bottom Sticky Button Area -->
  <rect x="0" y="540" width="360" height="100" fill="#FFFFFF" />
  <!-- Shadow above bottom bar -->
  <rect x="0" y="530" width="360" height="10" fill="url(#cardShadow)" opacity="0.3"/>
  
  <rect x="24" y="556" width="312" height="56" rx="28" fill="#2B2A28" />
  <text x="180" y="590" font-family="sans-serif" font-weight="bold" font-size="16" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">解析を開始</text>

</svg>