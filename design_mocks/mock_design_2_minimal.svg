<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" width="360" height="640">
  <!-- Background: WashiBg but slightly darker -->
  <rect width="360" height="640" fill="#F4EFE6" />
  
  <!-- Header -->
  <text x="24" y="56" font-family="sans-serif" font-weight="bold" font-size="20" fill="#2B2A28">日本语语法分析</text>
  <circle cx="330" cy="50" r="16" fill="#2B2A28" opacity="0.05" />
  <!-- Settings Icon -->
  <path d="M327 47 l 6 0 l 0 6 l -6 0 z M327 50 l 6 0 M330 47 l 0 6" stroke="#2B2A28" stroke-width="2" fill="none" opacity="0.8"/>

  <!-- App Title Area -->
  <text x="24" y="120" font-family="sans-serif" font-weight="bold" font-size="32" fill="#2B2A28">日文解析</text>
  <text x="24" y="145" font-family="sans-serif" font-size="14" fill="#2B2A28" opacity="0.6">理解每一句日语的结构与含义</text>

  <!-- Input Area (Full width rounded panel, White) -->
  <rect x="16" y="180" width="328" height="300" rx="24" fill="#FFFFFF" />

  <!-- Model Selector (Simple Text & Underline) -->
  <text x="32" y="220" font-family="sans-serif" font-weight="bold" font-size="12" fill="#2B2A28" opacity="0.5">使用的模型</text>
  <text x="110" y="220" font-family="sans-serif" font-weight="bold" font-size="14" fill="#2B2A28">Gemini Pro ▾</text>
  
  <line x1="32" y1="235" x2="328" y2="235" stroke="#E5E4E2" stroke-width="1" />

  <!-- Text Input Area (No visible background, just placeholder) -->
  <text x="32" y="265" font-family="sans-serif" font-size="16" fill="#2B2A28" opacity="0.3">输入日文句子或段落...</text>

  <!-- Image Attachment Placeholder (if an image was selected) -->
  <!-- <rect x="32" y="380" width="60" height="60" rx="8" fill="#E5E4E2" /> -->

  <!-- Divider -->
  <line x1="32" y1="410" x2="328" y2="410" stroke="#E5E4E2" stroke-width="1" stroke-dasharray="4" />

  <!-- Secondary Buttons (Icons only, minimal) -->
  <!-- Camera Button (SumiInk Outline) -->
  <rect x="32" y="425" width="44" height="44" rx="22" fill="none" stroke="#2B2A28" stroke-width="1" opacity="0.3" />
  <circle cx="54" cy="447" r="8" fill="none" stroke="#2B2A28" stroke-width="1.5" opacity="0.6"/>
  <circle cx="54" cy="447" r="2" fill="#2B2A28" opacity="0.6"/>
  <rect x="46" y="440" width="16" height="14" rx="2" fill="none" stroke="#2B2A28" stroke-width="1.5" opacity="0.6"/>

  <!-- Gallery Button -->
  <rect x="88" y="425" width="44" height="44" rx="22" fill="none" stroke="#2B2A28" stroke-width="1" opacity="0.3" />
  <rect x="98" y="437" width="24" height="18" rx="2" fill="none" stroke="#2B2A28" stroke-width="1.5" opacity="0.6"/>
  <circle cx="104" cy="442" r="2" fill="#2B2A28" opacity="0.6"/>
  <path d="M98 455 l 8 -8 l 6 6 l 4 -4 l 6 8 z" fill="none" stroke="#2B2A28" stroke-width="1.5" opacity="0.6"/>
  
  <text x="144" y="452" font-family="sans-serif" font-size="12" fill="#2B2A28" opacity="0.5">或提供图片</text>


  <!-- Primary Button (Floating Action Button style, SumiInk) -->
  <rect x="16" y="500" width="328" height="56" rx="16" fill="#2B2A28" />
  <text x="180" y="534" font-family="sans-serif" font-weight="bold" font-size="16" fill="#FFFFFF" text-anchor="middle">开始解析</text>

</svg>