<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" width="360" height="640">
  <!-- Background: WashiBg -->
  <rect width="360" height="640" fill="#FCF8F2" />
  
  <!-- Header -->
  <text x="24" y="56" font-family="sans-serif" font-weight="bold" font-size="20" fill="#2B2A28">日本语语法分析</text>
  <circle cx="330" cy="50" r="16" fill="#2B2A28" opacity="0.05" />
  <circle cx="330" cy="46" r="2" fill="#2B2A28" />
  <circle cx="330" cy="50" r="2" fill="#2B2A28" />
  <circle cx="330" cy="54" r="2" fill="#2B2A28" />

  <!-- App Title Area -->
  <text x="180" y="140" font-family="sans-serif" font-weight="bold" font-size="28" fill="#2B2A28" text-anchor="middle">日文解析</text>
  <text x="180" y="165" font-family="sans-serif" font-size="13" fill="#2B2A28" opacity="0.5" text-anchor="middle">智能拆解与语法分析</text>

  <!-- Main Card (No border, gentle shadow) -->
  <rect x="24" y="200" width="312" height="280" rx="20" fill="#FFFFFF" filter="drop-shadow(0px 8px 24px rgba(43, 42, 40, 0.06))" />

  <!-- Inside Card -->
  <!-- Model Selector (Capsule, KuriAmber bg) -->
  <text x="40" y="235" font-family="sans-serif" font-weight="bold" font-size="12" fill="#2B2A28" opacity="0.5">模型</text>
  <rect x="80" y="218" width="100" height="28" rx="14" fill="#ECCEB1" opacity="0.3" />
  <text x="96" y="236" font-family="sans-serif" font-weight="bold" font-size="12" fill="#2B2A28">Gemini Pro</text>
  <path d="M165 229 l 4 4 l 4 -4" fill="none" stroke="#2B2A28" stroke-width="1.5" opacity="0.6"/>

  <!-- Text Input Area (No outline, HaiMist bg) -->
  <rect x="40" y="260" width="280" height="120" rx="16" fill="#E5E4E2" opacity="0.4" />
  <text x="56" y="285" font-family="sans-serif" font-size="14" fill="#2B2A28" opacity="0.4">在此输入需要分析的日文段落...</text>

  <!-- Secondary Buttons (Tonal) -->
  <!-- Camera Button (MatchaGreen) -->
  <rect x="40" y="396" width="136" height="44" rx="12" fill="#C5E2C6" opacity="0.5" />
  <text x="108" y="422" font-family="sans-serif" font-weight="bold" font-size="13" fill="#2B2A28" text-anchor="middle">📷 拍照识别</text>

  <!-- Gallery Button (SakuraPink) -->
  <rect x="184" y="396" width="136" height="44" rx="12" fill="#FEDFE1" opacity="0.5" />
  <text x="252" y="422" font-family="sans-serif" font-weight="bold" font-size="13" fill="#2B2A28" text-anchor="middle">🖼️ 从相册选择</text>

  <!-- Primary Button (Pill shape, AizomeIndigo) -->
  <rect x="24" y="520" width="312" height="52" rx="26" fill="#BCCCD4" />
  <text x="180" y="551" font-family="sans-serif" font-weight="bold" font-size="16" fill="#FFFFFF" text-anchor="middle">开始分析</text>

</svg>